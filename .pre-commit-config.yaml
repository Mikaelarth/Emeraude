# Pre-commit hooks — execute before each commit, blocks on failure.
# Install once: `pre-commit install` (and `pre-commit install --hook-type commit-msg`).
# Run on all files: `pre-commit run --all-files`.

default_language_version:
  python: python3.11

repos:
  # ─── Generic hygiene ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ─── Ruff (lint + format) ──────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ─── Mypy strict ───────────────────────────────────────────────────────────
  # Local hook : ``uv run mypy`` uses our actual project venv (with the
  # ``emeraude`` package installed in editable mode), so it matches CI
  # exactly. The mirrors-mypy hook would require us to maintain a
  # mirror of every transitive dependency.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (uv-managed env, mirrors CI)
        entry: uv run mypy --config-file=pyproject.toml src tests
        language: system
        pass_filenames: false
        types: [python]

  # ─── Bandit (security) ─────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        files: ^src/

  # ─── Detect-secrets (no API keys/tokens leaked) ────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock.json|uv.lock

  # ─── Commitizen (Conventional Commits) ─────────────────────────────────────
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [commit-msg]
